<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OTC Algo Bot Control</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 350px; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; }
    h2 { font-size: 18px; margin-bottom: 15px; color: #00d9ff; }
    .status { padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 14px; }
    .status.active { background: #00ff4420; border: 1px solid #00ff44; }
    .status.inactive { background: #ff444420; border: 1px solid #ff4444; }
    label { display: block; margin: 10px 0 5px; font-size: 13px; color: #aaa; }
    input, select { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #333; background: #16213e; color: #fff; font-size: 13px; }
    button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-start { background: #00ff44; color: #000; }
    .btn-start:hover { background: #00cc33; }
    .btn-stop { background: #ff4444; color: #fff; }
    .btn-stop:disabled { opacity: 0.5; cursor: not-allowed; }
    .divider { height: 1px; background: #333; margin: 15px 0; }
    small { color: #666; font-size: 11px; }
  </style>
</head>
<body>
  <h2>🤖 OTC Algo Trading Bot</h2>
  
  <div class="status inactive" id="status">
    ⚪ Bot Inactive
  </div>

  <label>Timeframe (seconds)</label>
  <select id="timeframe">
    <option value="15">15 seconds</option>
    <option value="30" selected>30 seconds</option>
    <option value="60">60 seconds</option>
  </select>

  <label>Confidence Threshold (%)</label>
  <input type="number" id="confidence" value="60" min="0" max="100">

  <label>Trade Amount ($)</label>
  <input type="number" id="amount" value="1" min="1" step="1">

  <div class="divider"></div>

  <label>Telegram Bot Token (optional)</label>
  <input type="text" id="telegram-bot" placeholder="1234567890:ABC...">

  <label>Telegram Chat ID (optional)</label>
  <input type="text" id="telegram-chat" placeholder="123456789">

  <div class="divider"></div>

  <button class="btn-start" id="startBtn">START BOT</button>
  <button class="btn-stop" id="stopBtn" disabled>STOP BOT</button>

  <small>⚠️ DEMO ONLY - Test on Pocket Option demo account first</small>

  <script src="popup.js"></script>
</body>
</html>
